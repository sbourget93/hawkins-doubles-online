# LOCAL DEV nginx config (see infrastructure/local/docker-compose.yml).
# The prod equivalent is nginx.conf, which adds SSL and serves the built static
# frontend instead of proxying to the Vite dev server.
server {
    listen 80;

    # Same as prod: proxy API requests to the backend container.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # DEV ONLY: proxy everything else to the Vite dev server for hot module reload.
    # In prod (nginx.conf) this location serves the built static files instead.
    # The Upgrade/Connection headers are required for Vite's HMR websocket.
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
