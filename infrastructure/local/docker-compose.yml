services:
  backend:
    build: ../../backend
    ports:
      - "8000:8000"
    volumes:
      - ../../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
