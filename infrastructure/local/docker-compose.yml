services:
  backend:
    build: ../../backend
    volumes:
      - ../../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    build:
      context: ../..
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - ../../nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
